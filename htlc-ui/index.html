<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0B13" />
    <!--
      Force the HTML shell to revalidate on every load. JS/CSS assets have
      content-hashed filenames so they can (and should) cache forever, but the
      HTML itself references those hashes and must be fresh or the browser
      ends up loading an old bundle after `npm run build`.
    -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta
      name="description"
      content="Midswap OTC — Private cross-chain settlement between Cardano USDM and Midnight USDC. Hash-time-locked escrow, no custodian, no bridge."
    />
    <title>Midswap OTC — Cross-Chain Settlement</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0a0b13;
        color: #f5f7fa;
        font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, monospace;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
